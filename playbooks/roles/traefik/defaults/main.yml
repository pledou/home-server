# code: language=ansible
---
# Docker image versions for Traefik role
traefik_image: "traefik"
traefik_version: "v3.7"
unbound_image: "alpinelinux/unbound"
unbound_version: "latest"
unbound_exporter_git_repo: "https://github.com/letsencrypt/unbound_exporter.git"
unbound_exporter_git_version: "v0.5.0"
unbound_exporter_image: "local/unbound-exporter"
unbound_exporter_version: "v0.5.0"
unbound_offline_fallback_enabled: true
unbound_compose_project_name: "traefik"
alpine_image: "alpine"
alpine_version: "3.24"

# Access log path on the host (mounted into the container for fail2ban)
traefik_accesslog_host_path: "/var/log/traefik"

# Buffering middleware – 0 means no limit, which avoids restricting Nextcloud large-file transfers
traefik_max_response_body_bytes: 0

# Global security middlewares applied on Traefik HTTPS entrypoint
traefik_security_hsts_seconds: 63072000
traefik_security_hsts_include_subdomains: true
traefik_security_hsts_preload: true
traefik_security_rate_average: 200
traefik_security_rate_burst: 400
traefik_security_rate_period: "1s"
traefik_security_inflight_amount: 200

# Fail2ban integration
traefik_fail2ban_maxretry: 5
traefik_fail2ban_findtime: 600
traefik_fail2ban_bantime: 3600
