# code: language=ansible
---
- name: Verify stacks directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/home-server/stacks/monitoring"
    state: directory
    mode: u=g=rwx,o=rx

- name: Create Monitoring provisionning directories
  become: true
  ansible.builtin.file:
    path: "{{ docker_volumes_path }}/{{ item.name }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: u=rwx,g=o=r
  loop:
    - name: prometheus-conf
    - name: promtail-conf
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - name: grafana-provisioning
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - name: alertmanager-conf
    - name: loki-config
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - name: nextcloud-exporter-conf

- name: Retrive secret
  ansible.builtin.include_tasks: "tasks/retrieve_password.yml"
  vars:
    secrets:
      - grafana_admin_password
      - name: alertmanager_nextcloud_bot_secret
        length: 64
      - watchtower_api_token

- name: Ensure destination directory exists
  ansible.builtin.file:
    path: "{{ docker_volumes_path }}/{{ item }}"
    state: directory
    mode: u=rwx,g=o=rx
  loop:
    - grafana-provisioning/datasources
    - grafana-provisioning/dashboards

- name: Ensure node exporter textfile directory exists
  become: true
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile_collector
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: monitoring_fscheck_enabled | bool

- name: Install periodic filesystem health check script
  become: true
  ansible.builtin.template:
    src: filesystem-health-check.sh.j2
    dest: /usr/local/bin/filesystem-health-check.sh
    owner: root
    group: root
    mode: '0750'
  when: monitoring_fscheck_enabled | bool

- name: Schedule periodic filesystem health check
  become: true
  ansible.builtin.cron:
    name: "monitoring filesystem health check"
    minute: "{{ monitoring_fscheck_cron_minute }}"
    hour: "{{ monitoring_fscheck_cron_hour }}"
    job: "/usr/local/bin/filesystem-health-check.sh > /var/log/filesystem-health-check.log 2>&1"
  when: monitoring_fscheck_enabled | bool

- name: Deploy Prometheus configuration
  become: true
  ansible.builtin.template:
    src: prometheus.yml
    dest: "{{ docker_volumes_path }}/prometheus-conf/prometheus.yml"
    mode: u=rwx,g=o=rx
    owner: root
    group: root
  notify: Restart Prometheus

- name: Deploy Prometheus alert rules
  become: true
  ansible.builtin.template:
    src: alerts.rules
    dest: "{{ docker_volumes_path }}/prometheus-conf/alerts.rules"
    mode: u=rwx,g=o=rx
    force: true
  notify: Restart Prometheus

- name: Create configurations files as root
  become: true
  ansible.builtin.template:
    src: "{{ item.file }}"
    dest: "{{ docker_volumes_path }}/{{ item.dest }}"
    mode: u=rwx,g=o=rx
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
  loop:
    - file: loki.yml
      dest: loki-config/local-config.yaml
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - file: promtail-config.yml
      dest: promtail-conf/config.yml
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - file: grafana/datasources.yml
      dest: grafana-provisioning/datasources/datasource.yml
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - file: grafana/dashboards/dashboard.yml
      dest: grafana-provisioning/dashboards/dashboard.yml
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - file: grafana/dashboards/docker-logs.json
      dest: grafana-provisioning/dashboards/docker-logs.json
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    - file: nextcloud-exporter-conf.yml
      dest: nextcloud-exporter-conf/config.yml
    - file: alertmanager-config.yml
      dest: alertmanager-conf/config.yml
  loop_control:
    label: "{{ item.file }} -> {{ item.dest }}"


- name: Get Users infos
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"

- name: Check Authentik API availability
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/admin/version/"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    status_code: 200
    validate_certs: true
  register: authentik_api_health
  changed_when: false
  failed_when: false
  when: authentik_api_token is defined

- name: Configure Authentik providers and applications for Monitoring
  become: false
  when:
    - authentik_api_token is defined
    - authentik_api_health is defined
    - authentik_api_health.status | default(0) == 200
  block:
    - name: Create Grafana role-mapping groups in Authentik
      when: authentik_api_token is defined
      block:
        - name: Create grafana-admin group
          ansible.builtin.uri:
            url: "{{ authentik_api_base_url }}/api/v3/core/groups/"
            method: POST
            headers:
              Authorization: "Bearer {{ authentik_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              name: "grafana-admin"
              is_superuser: false
            status_code: [201, 400]
            validate_certs: true
          register: grafana_admin_group
          changed_when: grafana_admin_group.status == 201

        - name: Create grafana-editor group
          ansible.builtin.uri:
            url: "{{ authentik_api_base_url }}/api/v3/core/groups/"
            method: POST
            headers:
              Authorization: "Bearer {{ authentik_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              name: "grafana-editor"
              is_superuser: false
            status_code: [201, 400]
            validate_certs: true
          register: grafana_editor_group
          changed_when: grafana_editor_group.status == 201

        - name: Create grafana-user group
          ansible.builtin.uri:
            url: "{{ authentik_api_base_url }}/api/v3/core/groups/"
            method: POST
            headers:
              Authorization: "Bearer {{ authentik_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              name: "grafana-user"
              is_superuser: false
            status_code: [201, 400]
            validate_certs: true
          register: grafana_user_group
          changed_when: grafana_user_group.status == 201

        - name: Create grafana-viewer group
          ansible.builtin.uri:
            url: "{{ authentik_api_base_url }}/api/v3/core/groups/"
            method: POST
            headers:
              Authorization: "Bearer {{ authentik_api_token }}"
              Content-Type: "application/json"
            body_format: json
            body:
              name: "grafana-viewer"
              is_superuser: false
            status_code: [201, 400]
            validate_certs: true
          register: grafana_viewer_group
          changed_when: grafana_viewer_group.status == 201

    - name: Configure Authentik providers and applications for Monitoring services
      when: authentik_api_token is defined
      ansible.builtin.include_tasks: "tasks/authentik_common.yml"
      vars:
        provider_apps:
          - provider:
              name: "alertmanager-provider"
              external_host: "https://alertmanager.{{ app_domain_name }}"
            app:
              name: "Alertmanager"
              slug: "alertmanager"
          - provider:
              name: "prometheus-provider"
              external_host: "https://prometheus.{{ app_domain_name }}"
            app:
              name: "Prometheus"
              slug: "prometheus"
          - provider:
              name: "grafana-provider"
              external_host: "https://grafana.{{ app_domain_name }}"
            app:
              name: "Grafana"
              slug: "grafana"

- name: Skip Authentik configuration when API is unavailable
  ansible.builtin.debug:
    msg: >-
      Authentik API unreachable at {{ authentik_api_base_url }}; skipping Monitoring SSO/group setup for now.
      Re-run with --tags monitoring after Authentik/Traefik are healthy.
  when:
    - authentik_api_token is defined
    - authentik_api_health is defined
    - authentik_api_health.status | default(0) != 200

- name: Clone Nextcloud Talk webhook bot repository
  ansible.builtin.git:
    repo: https://github.com/pledou/nextcloud-talk-webhook-bot.git
    # add Alertmanager json format support to https://github.com/weichwaren-schmiede/nextcloud-talk-webhook-bot.git
    # A MR has been opened here: https://github.com/weichwaren-schmiede/nextcloud-talk-webhook-bot/pull/1
    dest: /home/{{ ansible_user }}/home-server/stacks/monitoring/nextcloud-talk-bot
    version: main
    force: true
  when: alertmanager_nextcloud_conversation_token is defined and alertmanager_nextcloud_conversation_token

- name: Create docker-compose stack file
  ansible.builtin.template:
    src: docker-compose.yml
    dest: /home/{{ ansible_user }}/home-server/stacks/monitoring/docker-compose.yml
    mode: u=g=rwx,o=rx

- name: Install Grafana dashboards from Grafana.com and other sources
  ansible.builtin.include_tasks: "tasks/grafana_dashboard_install_fix.yml"
  vars:
    dashboard_file_path: "{{ docker_volumes_path }}/grafana-provisioning/dashboards/{{ item.name }}.json"
  loop: "{{ grafana_dashboard_updates | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Try to pull latest images (continue on failure)
  community.docker.docker_compose_v2:
    pull: "always"
    state: present
    project_src: /home/{{ ansible_user }}/home-server/stacks/monitoring
  ignore_errors: true
  register: pull_result

- name: Warning - using local images
  ansible.builtin.debug:
    msg: "WARNING: Could not pull latest images. Deploying with existing local images."
  when: pull_result is failed

- name: Deploy stack from a compose file
  community.docker.docker_compose_v2:
    pull: "never"
    build: "always"
    state: present
    project_src: /home/{{ ansible_user }}/home-server/stacks/monitoring

- name: Check if Nextcloud container exists
  ansible.builtin.shell:
    cmd: docker ps -a --filter "name=nc-nextcloud-1" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: nextcloud_container_check
  changed_when: false
  failed_when: false

- name: Set nextcloud container exists fact
  ansible.builtin.set_fact:
    nextcloud_container:
      exists: "{{ 'nc-nextcloud-1' in nextcloud_container_check.stdout }}"

- name: Install Nextcloud Talk bot for alerts
  when:
    - nextcloud_container.exists | default(false)
    - alertmanager_nextcloud_conversation_token is defined
    - alertmanager_nextcloud_conversation_token | length > 0
  block:
    - name: Check if bot already exists
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -u
          - www-data
          - nc-nextcloud-1
          - php
          - occ
          - talk:bot:list
      register: bot_list
      changed_when: false
      failed_when: false

    - name: Install Prometheus Alerts bot
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -u
          - www-data
          - nc-nextcloud-1
          - php
          - occ
          - talk:bot:install
          - "Prometheus Alerts"
          - "{{ alertmanager_nextcloud_bot_secret }}"
          - "https://prometheus.{{ app_domain_name }}"
      when: "'Prometheus Alerts' not in bot_list.stdout"
      register: bot_install
      changed_when: bot_install.rc == 0
      failed_when:
        - bot_install.rc != 0
        - "'already exists' not in bot_install.stderr"

    - name: Get bot list to extract ID
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -u
          - www-data
          - nc-nextcloud-1
          - php
          - occ
          - talk:bot:list
      register: bot_list_output
      changed_when: false

    - name: Extract Prometheus Alerts bot ID
      ansible.builtin.set_fact:
        prometheus_bot_id: "{{ (bot_list_output.stdout_lines
          | select('search', '^\\|\\s*\\d+\\s*\\|\\s*Prometheus Alerts\\s*\\|')
          | map('regex_replace', '^\\|\\s*(\\d+)\\s*\\|.*$', '\\1')
          | first
          | default('')) | trim }}"

    - name: Ensure Prometheus Alerts bot ID was found
      ansible.builtin.fail:
        msg: >
          Could not extract Prometheus Alerts bot ID from `occ talk:bot:list` output.
          Output was: {{ bot_list_output.stdout }}
      when:
        - prometheus_bot_id | length == 0 or not (prometheus_bot_id is match('^\\d+$'))

    - name: Add bot to conversation
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - -u
          - www-data
          - nc-nextcloud-1
          - php
          - occ
          - talk:bot:setup
          - "{{ prometheus_bot_id }}"
          - "{{ alertmanager_nextcloud_conversation_token }}"
      register: bot_setup
      changed_when: bot_setup.rc == 0
      failed_when:
        - bot_setup.rc != 0
        - "'already' not in bot_setup.stdout and 'already' not in bot_setup.stderr"

    - name: Display bot configuration result
      ansible.builtin.debug:
        msg: |
          Nextcloud Talk bot 'Prometheus Alerts' is fully configured and
          added to conversation {{ alertmanager_nextcloud_conversation_token }}.
          Alerts will now be sent to your Nextcloud Talk conversation!
