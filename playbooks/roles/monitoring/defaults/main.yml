# code: language=ansible
---
# Docker image versions for Monitoring role
prometheus_image: "prom/prometheus"
prometheus_version: "v3.12.0"
alertmanager_image: "prom/alertmanager"
alertmanager_version: "v0.33.0"
node_exporter_image: "quay.io/prometheus/node-exporter"
node_exporter_version: "v1.11.1"
grafana_image: "grafana/grafana"
grafana_version: "13.0.2"
loki_image: "grafana/loki"
loki_version: "3.7.2"
promtail_image: "grafana/promtail"
promtail_version: "3.6.11"
cadvisor_image: "gcr.io/cadvisor/cadvisor"
cadvisor_version: "v0.55.1"
autoheal_image: "willfarrell/autoheal"
autoheal_version: "latest"
nextcloud_exporter_image: "xperimental/nextcloud-exporter"
nextcloud_exporter_version: "0.9.1"
nvidia_gpu_exporter_image: "nvcr.io/nvidia/k8s/dcgm-exporter"
nvidia_gpu_exporter_version: "4.5.3-4.8.2"
watchtower_image: "percona/watchtower"
watchtower_version: "3"
fail2ban_exporter_image: "registry.gitlab.com/hctrdev/fail2ban-prometheus-exporter"
fail2ban_exporter_version: "latest"

# Grafana dashboards to refresh from Grafana.com (gnetId)
grafana_dashboard_updates:
  - gnet_id: 17346 # Traefik Official Standalone Dashboard
    name: traefik-dashboard
  - gnet_id: 1860 # Node Explorer Full
    name: node-explorer-full
  - gnet_id: 20716 # Nextcloud
    name: nextcloud
  - gnet_id: 17821 # Nextcloud Logs
    name: nextcloud-logs
  - gnet_id: 14837 # authentik
    name: authentik
  - gnet_id: 21743 # cadvisor-exporter-docker-containers-overview
    name: cadvisor
  - gnet_id: 23005 # Watchtower
    name: watchtower
  - gnet_id: 18077 # Unbound (Prometheus + Loki)
    name: unbound
  - gnet_id: 25526 # NVIDIA DCGM Exporter
    name: nvidia-dcgm-exporter
  - gnet_id: 16125 # Fail2ban
    name: fail2ban
  - url: https://raw.githubusercontent.com/NorskHelsenett/ollama-metrics/main/prometheus/dashboard.json
    name: ollama-metrics

# Alerting configuration
# These should be overridden in group_vars or host_vars
# alertmanager_nextcloud_conversation_token: ""  # Optional Nextcloud Talk conversation token
# (used by Alertmanager + Watchtower notifications)
# alertmanager_email_to: "changeme"
# alertmanager_smtp_host: "changeme"
# alertmanager_smtp_port: "changeme"
# alertmanager_smtp_from: "changeme"
# alertmanager_smtp_user: "changeme"
# alertmanager_smtp_password: "changeme"
# alertmanager_smtp_require_tls: true

# Filesystem periodic health check (host-level)
monitoring_fscheck_enabled: true
monitoring_fscheck_cron_minute: "15"
monitoring_fscheck_cron_hour: "*/1"
monitoring_fscheck_lookback_minutes: 70
