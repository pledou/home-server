# code: language=ansible
---
# HACS (Home Assistant Community Store) automated setup

- name: Check if HACS is already installed
  become: true
  ansible.builtin.stat:
    path: "{{ docker_volumes_path }}/homeassistant/custom_components/hacs"
  register: hacs_directory

- name: Download and install HACS
  when: not hacs_directory.stat.exists
  block:
    - name: Create custom_components directory
      become: true
      ansible.builtin.file:
        path: "{{ docker_volumes_path }}/homeassistant/custom_components"
        state: directory
        owner: root
        group: 0998
        mode: u=rwx,g=rx,o=

    - name: Get latest HACS release info
      ansible.builtin.uri:
        url: https://api.github.com/repos/hacs/integration/releases/latest
        method: GET
        return_content: true
      register: hacs_release

    - name: Download HACS zip
      become: true
      ansible.builtin.get_url:
        url: "{{ hacs_release.json.assets | selectattr('name', 'equalto', 'hacs.zip') | map(attribute='browser_download_url') | first }}"
        dest: "/tmp/hacs.zip"
        mode: '0644'

    - name: Unzip HACS to custom_components
      become: true
      ansible.builtin.unarchive:
        src: "/tmp/hacs.zip"
        dest: "{{ docker_volumes_path }}/homeassistant/custom_components"
        remote_src: true
        owner: root
        group: 0998
        mode: u=rwx,g=rx,o=

    - name: Remove HACS zip file
      become: true
      ansible.builtin.file:
        path: "/tmp/hacs.zip"
        state: absent

    - name: Notify about HACS installation
      ansible.builtin.debug:
        msg: "HACS installed. Home Assistant will need to restart to load it."

- name: Wait for Home Assistant to be ready (after potential HACS install)
  ansible.builtin.uri:
    url: "http://127.0.0.1:8123"
    method: GET
    status_code: 200
  register: ha_health_check
  retries: 60
  delay: 5
  when: not hacs_directory.stat.exists

