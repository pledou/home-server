# Default variables for IA role
---
# Docker image versions
webui_image: "ghcr.io/open-webui/open-webui"
webui_version: "main"
ollama_image: "ollama/ollama"
ollama_version: "latest"
ollama_intel_image: "intelanalytics/ipex-llm-inference-cpp-xpu"
ollama_intel_version: "latest"
speaches_image: "ghcr.io/speaches-ai/speaches"
speaches_cpu_version: "latest-cpu"
speaches_cuda_version: "latest-cuda"
speaches_stt_model: "Systran/faster-whisper-small"
speaches_tts_model: "rhasspy/piper-voices"
speaches_preload_models:
  - "{{ speaches_stt_model }}"
speaches_postdeploy_model_install_enabled: true
speaches_postdeploy_models:
  - "speaches-ai/piper-fr_FR-upmc-medium"
ollama_metrics_image: "ghcr.io/norskhelsenett/ollama-metrics"
ollama_metrics_version: "latest"

webui_secret_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"

ollama_memory_limit_ratio: 0.90
ollama_min_memory_mb: 4096
ollama_min_cpus: 0.5
ollama_reserved_cpus: 0.5

ollama_detected_vcpus: "{{ ansible_facts.processor_vcpus | default(ansible_processor_vcpus) | default(2) | int }}"
ollama_detected_mem_mb: "{{ ansible_facts.memtotal_mb | default(ansible_memtotal_mb) | default(8192) | int }}"

ollama_cpu_limit_raw: "{{ (ollama_detected_vcpus | float) - (ollama_reserved_cpus | float) }}"
ollama_cpu_limit: >-
  {%- set cpu_limit_float = ollama_cpu_limit_raw | float -%}
  {%- set min_cpus_float = ollama_min_cpus | float -%}
  {{ (cpu_limit_float | round(2)) if (cpu_limit_float > min_cpus_float) else min_cpus_float }}
ollama_memory_limit_mb_raw: "{{ ((ollama_detected_mem_mb | int) * (ollama_memory_limit_ratio | float)) | int }}"
ollama_memory_limit_mb: >-
  {{ (ollama_memory_limit_mb_raw | int)
     if (ollama_memory_limit_mb_raw | int) > (ollama_min_memory_mb | int)
     else (ollama_min_memory_mb | int) }}
ollama_num_threads: >-
  {{ ((ollama_cpu_limit | float) | round(0, 'floor') | int)
     if (ollama_cpu_limit | float) >= 1.0
     else 1 }}
