# Default variables for IA role
---
# Docker image versions
webui_image: "ghcr.io/open-webui/open-webui"
webui_version: "main"
ollama_image: "ollama/ollama"
ollama_version: "latest"
ollama_intel_image: "intelanalytics/ipex-llm-inference-cpp-xpu"
ollama_intel_version: "latest"
speaches_image: "ghcr.io/speaches-ai/speaches"
speaches_cpu_version: "latest-cpu"
speaches_cuda_version: "latest-cuda"
speaches_stt_model: "Systran/faster-whisper-small"
speaches_tts_model: "speaches-ai/piper-fr_FR-upmc-medium"
speaches_tts_voice: "upmc"
speaches_preload_models:
  - "{{ speaches_stt_model }}"
  - "{{ speaches_tts_model }}"
speaches_postdeploy_models:
  - "{{ speaches_tts_model }}"
ollama_metrics_image: "ghcr.io/norskhelsenett/ollama-metrics"
ollama_metrics_version: "latest"
ollama_embeddings_metrics_image: "ghcr.io/norskhelsenett/ollama-embeddings-metrics"
ollama_embeddings_metrics_version: "{{ ollama_metrics_version }}"
ollama_metrics_repo_url: "https://github.com/NorskHelsenett/ollama-metrics.git"
ollama_metrics_repo_ref: "main"
ollama_metrics_request_duration_buckets:
  - 0.1
  - 0.5
  - 1
  - 2
  - 5
  - 10
  - 30
  - 60
  - 120
  - 300
  - 600
  - 1200
chromadb_image: "chromadb/chroma"
chromadb_version: "latest"

# Ollama embeddings configuration (separate instance for embeddings)
ollama_embeddings_image: "{{ ollama_image }}"
ollama_embeddings_version: "{{ ollama_version }}"
ollama_embeddings_intel_image: "{{ ollama_intel_image }}"
ollama_embeddings_intel_version: "{{ ollama_intel_version }}"

# Embeddings resource limits (smaller than main ollama)
ollama_embeddings_memory_limit_ratio: 0.15
ollama_embeddings_min_memory_mb: 2048
ollama_embeddings_shm_size_mb: 4096
ollama_embeddings_min_cpus: 0.5
ollama_embeddings_cpu_limit_raw: "{{ (ollama_detected_vcpus | float) * 0.25 }}"
ollama_embeddings_cpu_limit: >-
  {%- set cpu_limit_float = ollama_embeddings_cpu_limit_raw | float -%}
  {%- set min_cpus_float = ollama_embeddings_min_cpus | float -%}
  {{ (cpu_limit_float | round(2)) if (cpu_limit_float > min_cpus_float) else min_cpus_float }}
ollama_embeddings_memory_limit_mb_raw: >-
  {{ (((ollama_detected_mem_mb | int) * (ollama_embeddings_memory_limit_ratio | float)) | int)
     + (ollama_embeddings_shm_size_mb | int) }}
ollama_embeddings_memory_limit_mb: >-
  {{ (ollama_embeddings_memory_limit_mb_raw | int)
     if (ollama_embeddings_memory_limit_mb_raw | int) > ((ollama_embeddings_min_memory_mb | int) + (ollama_embeddings_shm_size_mb | int))
     else ((ollama_embeddings_min_memory_mb | int) + (ollama_embeddings_shm_size_mb | int)) }}
ollama_embeddings_num_threads: >-
  {{ ((ollama_embeddings_cpu_limit | float) | round(0, 'floor') | int)
     if (ollama_embeddings_cpu_limit | float) >= 1.0
     else 1 }}

# Exposed IA runtime endpoints for cross-role integrations (e.g. hassio)
ia_openai_base_url: "http://127.0.0.1:8080/v1"
ia_embeddings_base_url: "http://127.0.0.1:8082"
ia_homeassistant_agent_model: "ministral-3:3b"
ia_ollama_embedding_model: "nomic-embed-text-v2-moe"
ia_chromadb_host: "127.0.0.1"
ia_chromadb_port: 8001
ia_speaches_openai_base_url: "http://127.0.0.1:8000/v1"

webui_secret_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"

ollama_memory_limit_ratio: 0.90
ollama_min_memory_mb: 4096
# ollama_shm_size_mb: 10240 # Sifficient for 8b, 13b models
ollama_min_cpus: 0.5
ollama_reserved_cpus: 0.5

ollama_shm_size_mb: 20480 # Sufficient for 8b, 13b, 20b models

ollama_detected_vcpus: "{{ ansible_facts.processor_vcpus | default(ansible_processor_vcpus) | default(2) | int }}"
ollama_detected_mem_mb: "{{ ansible_facts.memtotal_mb | default(ansible_memtotal_mb) | default(8192) | int }}"

ollama_cpu_limit_raw: "{{ (ollama_detected_vcpus | float) - (ollama_reserved_cpus | float) }}"
ollama_cpu_limit: >-
  {%- set cpu_limit_float = ollama_cpu_limit_raw | float -%}
  {%- set min_cpus_float = ollama_min_cpus | float -%}
  {{ (cpu_limit_float | round(2)) if (cpu_limit_float > min_cpus_float) else min_cpus_float }}
ollama_memory_limit_mb_raw: >-
  {{ (((ollama_detected_mem_mb | int) * (ollama_memory_limit_ratio | float)) | int)
     + (ollama_shm_size_mb | int) }}
ollama_memory_limit_mb: >-
  {{ (ollama_memory_limit_mb_raw | int)
     if (ollama_memory_limit_mb_raw | int) > ((ollama_min_memory_mb | int) + (ollama_shm_size_mb | int))
     else ((ollama_min_memory_mb | int) + (ollama_shm_size_mb | int)) }}
ollama_num_threads: >-
  {{ ((ollama_cpu_limit | float) | round(0, 'floor') | int)
     if (ollama_cpu_limit | float) >= 1.0
     else 1 }}

IA_openai_api_key: ""
IA_openai_api_url: "https://api.mistral.ai/v1"
