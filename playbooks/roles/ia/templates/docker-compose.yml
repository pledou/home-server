#jinja2: lstrip_blocks: True, trim_blocks: True
services:

  webui:
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.docker.network=traefik_backend
      - traefik.constraint-label=traefik_backend
      - traefik.http.routers.ia-https.rule=Host(`ia.{{ app_domain_name }}`)
      - traefik.http.routers.ia-https.entrypoints=https
      - traefik.http.routers.ia-https.tls=true
      - traefik.http.routers.ia-https.tls.certresolver=le
      - traefik.http.services.ia.loadbalancer.server.port=8080
    image: "{{ webui_image }}:{{ webui_version }}"
    # Dependencies for tools
    command: >
      bash -c "
        pip install requests pydantic caldav icalendar &&
        exec bash start.sh
      "
    environment:
      OLLAMA_BASE_URL: http://ollama-metrics:8080

      # Generic OAuth
      OAUTH_PROVIDER_NAME: "authentik"
      OAUTH_CLIENT_ID: "{{ webui_oauth_client_id }}" # TODO move to secret
      OAUTH_CLIENT_SECRET: "{{ webui_oauth_client_secret }}" # TODO move to secret
      OAUTH_SCOPES: "openid profile email"
      OPENID_PROVIDER_URL: "https://auth.{{ app_domain_name }}/application/o/{{ webui_oauth_slug_name }}/.well-known/openid-configuration"
      WEBUI_URL: "https://ia.{{ app_domain_name }}"
      ENABLE_OAUTH_SIGNUP: True
      ENABLE_LOGIN_FORM: False
      DEFAULT_LOCALE: "fr"
      DEFAULT_MODELS: "ministral-3"
      DEFAULT_USER_ROLE: "user"
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: True

      AUDIO_OPENAI_API_BASE_URL: "http://speaches:8000/v1"
      AUDIO_OPENAI_API_KEY: "openai-api-key"
      AUDIO_TTS_ENGINE: "openai"
      AUDIO_TTS_OPENAI_API_BASE_URL: "http://speaches:8000/v1"
      AUDIO_TTS_OPENAI_API_KEY: "openai-api-key"
      AUDIO_TTS_MODEL: "{{ speaches_tts_model}}"
      AUDIO_TTS_VOICE: "{{ speaches_tts_voice}}"
      AUDIO_STT_ENGINE: "openai"
      AUDIO_STT_OPENAI_API_BASE_URL: "http://speaches:8000/v1"
      AUDIO_STT_OPENAI_API_KEY: "openai-api-key"
      AUDIO_STT_MODEL: "{{ speaches_stt_model }}"
      ENABLE_ADMIN_EXPORT: False
      {% if IA_openai_api_key is defined and IA_openai_api_key != "" %}
      OPENAI_API_BASE_URLS: "{{ IA_openai_api_url }}"
      OPENAI_API_KEYS: "{{ IA_openai_api_key }}"
      {% endif %}

      # Vector Database for RAG
      VECTOR_DB: "chroma"
      CHROMA_HTTP_HOST: "chromadb"
      CHROMA_HTTP_PORT: "8000"
      
      # RAG Embeddings (separate ollama instance)
      RAG_EMBEDDING_ENGINE: "ollama"
      RAG_OLLAMA_BASE_URL: "http://ollama-embeddings-metrics:8082"
      RAG_EMBEDDING_MODEL: "{{ ia_ollama_embedding_model }}"
    restart: always
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - network
      - traefik_backend
    depends_on:
     - ollama
     - ollama-embeddings
     - speaches
     - chromadb

  webui-api-proxy:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    image: nginx:alpine
    depends_on:
      - webui
      - speaches
    restart: always
    networks:
      network:
        aliases:
          - webui-api-proxy
    volumes:
      - ./webui-api-proxy.conf:/etc/nginx/conf.d/default.conf:ro


  ollama:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    {% if gpu == 'intel' %}
    user: root
    {% endif %}
    image: "{% if gpu == 'intel' %}{{ ollama_intel_image }}:{{ ollama_intel_version }}{% else %}{{ ollama_image }}:{{ ollama_version }}{% endif %}"
    {% if gpu != 'intel' %}
    healthcheck:
      test: ollama --version || exit 1
    command: serve
    {% else %}
    command: ["bash", "-c", "source ipex-llm-init --gpu --device iGPU && bash start-ollama.sh"]
    {% endif %}
    pull_policy: always
    tty: true
    restart: always
    cpus: "{{ ollama_cpu_limit }}"
    mem_limit: "{{ ollama_memory_limit_mb }}m"
    shm_size: "{{ ollama_shm_size_mb }}m"
    environment:
      {% if gpu == 'intel' %}
      - DEVICE=iGPU
      {% endif %}
      - OLLAMA_KEEP_ALIVE={{ '24h' if gpu == 'none' else '2h' }}
      - OLLAMA_NUM_THREADS={{ ollama_num_threads }}
      - OLLAMA_HOST=0.0.0.0
      {% if gpu == 'intel' %}
      - no_proxy=localhost,127.0.0.1
      - OLLAMA_NUM_GPU=999
      - ZES_ENABLE_SYSMAN=1
      - SYCL_CACHE_PERSISTENT=1
      - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
      {% endif %}
    {% if gpu == 'intel' %}
    working_dir: /llm/scripts/
    {% endif %}
    volumes:
      - ollama:/root/.ollama
    {% if gpu == 'intel' %}
    devices:
      - /dev/dri:/dev/dri
    {% endif %}
    networks:
      network:
        aliases:
          - ollama
    {% if gpu == 'nvidia' or gpu == 'intel' %}
    deploy:
      resources:
        reservations:
          devices:
            - driver: {{ 'intel' if gpu == 'intel' else 'nvidia' }}
              device_ids: ['all']
              capabilities: [gpu]
    {% endif %}

  ollama-metrics:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    build:
      context: .
      dockerfile: ./ollama-metrics.Dockerfile
    image: "{{ ollama_metrics_image }}:{{ ollama_metrics_version }}"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PORT=8080
    depends_on:
      - ollama
    expose:
      - 8080/tcp
    ports:
      - 8080:8080/tcp
    restart: unless-stopped
    networks:
      network:
        aliases:
          - ollama-metrics
      monitoring_backend:
        aliases:
          - ollama-metrics

  {% if gpu != 'intel' %}
  ollama-embeddings:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    image: "{{ ollama_embeddings_image }}:{{ ollama_embeddings_version }}"
    healthcheck:
      test: ollama --version || exit 1
    command: serve
    pull_policy: always
    tty: true
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_THREADS={{ ollama_embeddings_num_threads }}
      - OLLAMA_HOST=0.0.0.0
    networks:
      network:
        aliases:
          - ollama-embeddings
    volumes:
      - ollama-embeddings:/root/.ollama
    
    cpus: "{{ ollama_embeddings_cpu_limit }}"
    mem_limit: "{{ ollama_embeddings_memory_limit_mb }}m"
    shm_size: "{{ ollama_embeddings_shm_size_mb }}m"

    {% if gpu == 'nvidia' %}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['all']
              capabilities: [gpu]
    {% endif %}
  {% else %}
  ollama-embeddings:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    user: root
    image: "{{ ollama_embeddings_intel_image }}:{{ ollama_embeddings_intel_version }}"
    cpus: "{{ ollama_embeddings_cpu_limit }}"
    mem_limit: "{{ ollama_embeddings_memory_limit_mb }}m"
    shm_size: "{{ ollama_embeddings_shm_size_mb }}m" 
    pull_policy: always
    tty: true
    restart: always
    environment:
      - DEVICE=iGPU
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_THREADS={{ ollama_embeddings_num_threads }}
      - OLLAMA_HOST=0.0.0.0
      - no_proxy=localhost,127.0.0.1
      - OLLAMA_NUM_GPU=999
      - ZES_ENABLE_SYSMAN=1
      - SYCL_CACHE_PERSISTENT=1
      - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
    working_dir: /llm/scripts/
    command: ["bash", "-c", "source ipex-llm-init --gpu --device iGPU && bash start-ollama.sh"]
    
    volumes:
      - ollama-embeddings:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    networks:
      network:
        aliases:
          - ollama-embeddings
    deploy:
      resources:
        reservations:
          devices:
            - driver: intel
              device_ids: ['all']
              capabilities: [gpu]
  {% endif %}

  ollama-embeddings-metrics:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    build:
      context: .
      dockerfile: ./ollama-metrics.Dockerfile
    image: "{{ ollama_embeddings_metrics_image }}:{{ ollama_embeddings_metrics_version }}"
    environment:
      - OLLAMA_HOST=http://ollama-embeddings:11434
      - PORT=8082
    depends_on:
      - ollama-embeddings
    expose:
      - 8082/tcp
    ports:
      - 8082:8082/tcp
    restart: unless-stopped
    networks:
      network:
        aliases:
          - ollama-embeddings-metrics
      monitoring_backend:
        aliases:
          - ollama-embeddings-metrics

  speaches:
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.docker.network=traefik_backend
      - traefik.constraint-label=traefik_backend
      - traefik.http.routers.ia-audio-https.rule=Host(`ia.{{ app_domain_name }}`) && PathPrefix(`/v1/audio`)
      - traefik.http.routers.ia-audio-https.priority=100
      - traefik.http.routers.ia-audio-https.entrypoints=https
      - traefik.http.routers.ia-audio-https.tls=true
      - traefik.http.routers.ia-audio-https.tls.certresolver=le
      - traefik.http.services.ia-audio.loadbalancer.server.port=8000
    image: "{{ speaches_image }}:{{ speaches_cuda_version if gpu == 'nvidia' else speaches_cpu_version }}"
    pull_policy: always
    environment:
      - PRELOAD_MODELS={{ speaches_preload_models | to_json }}
    networks:
      network:
        aliases:
          - speaches
      traefik_backend:
    ports:
      - 8000:8000
    volumes:
      - speaches-hf-cache:/home/ubuntu/.cache/huggingface/hub
      - ./model_aliases.json:/home/ubuntu/speaches/model_aliases.json:ro
    restart: unless-stopped
    {% if gpu == 'nvidia' %}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # device_ids: ['0', '1'] # Select a gpu, or use 'all' to use all available gpus
              count: all
              capabilities: [gpu]
    {% endif %}

  chromadb:
    labels:
      - com.centurylinklabs.watchtower.enable=true
    image: "{{ chromadb_image }}:{{ chromadb_version }}"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb:/chroma/chroma
    ports:
      - 8001:8000
    restart: unless-stopped
    networks:
      network:
        aliases:
          - chromadb

volumes:
  ollama:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "{{ docker_volumes_path }}/ollama"
  ollama-embeddings:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "{{ docker_volumes_path }}/ollama-embeddings"
  open-webui:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "{{ docker_volumes_path }}/open-webui"
  speaches-hf-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "{{ docker_volumes_path }}/speaches-hf-cache"
  chromadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "{{ docker_volumes_path }}/chromadb"

networks:
  network:
  traefik_backend:
    external: true
  monitoring_backend:
    external: true