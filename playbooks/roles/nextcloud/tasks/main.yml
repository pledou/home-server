# code: language=ansible
---
- name: Gather traefik_backend IPv4 network subnet for HaRP trusted proxy
  ansible.builtin.shell: |
    set -o pipefail
    docker network inspect traefik_backend 2>/dev/null | \
      jq -r '.[0].IPAM.Config[] | select(.Subnet | test("^[0-9]+\\.")) | .Subnet' | head -1
  args:
    executable: /bin/bash
  register: traefik_network_subnet_ipv4
  changed_when: false
  failed_when: false

- name: Gather traefik_backend IPv6 network subnet for HaRP trusted proxy
  ansible.builtin.shell: |
    set -o pipefail
    docker network inspect traefik_backend 2>/dev/null | \
      jq -r '.[0].IPAM.Config[] | select(.Subnet | test(":")) | .Subnet' | head -1
  args:
    executable: /bin/bash
  register: traefik_network_subnet_ipv6
  changed_when: false
  failed_when: false

- name: Set harp_trusted_proxy_ips from detected subnets or fallback
  ansible.builtin.set_fact:
    harp_trusted_proxy_ips: >-
      {% set ipv4 = traefik_network_subnet_ipv4.stdout | default('') | trim %}
      {% set ipv6 = traefik_network_subnet_ipv6.stdout | default('') | trim %}
      {% set ipv4_net = ipv4 if ipv4 else '172.18.0.0/16' %}
      {% set ipv4_base = ipv4_net | regex_replace('/.*', '') %}
      {% set parts = [] %}
      {% set _ = parts.append(ipv4_net) %}
      {% set _ = parts.append('::ffff:' + ipv4_base + '/112') %}
      {% if ipv6 %}{% set _ = parts.append(ipv6) %}{% endif %}
      {{ parts | join(',') }}

- name: Verify stacks directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/home-server/stacks/nc"
    state: directory
    mode: u=g=rwx,o=rx
- name: Retrive secret
  ansible.builtin.include_tasks: "retrieve_password.yml"
  vars:
    secrets:
      - nextcloud_admin_secret
      - database_user_secret
      - talk_secret
      - redis_secret
      - nc_elastic_secret
      - AppAPISecret
      - turn_secret

- name: Create nextcloud provisionning directories
  become: true
  ansible.builtin.file:
    path: "{{ docker_volumes_path }}/{{ item.name }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('u=rwx,g=o=') }}"
  loop:
    - name: nextcloud-redis-data
      group: 999
      owner: 999
    - name: nextcloud-turnserver-data
    - name: nextcloud-www
      owner: 33
      group: 33
    - name: nextcloud-config
      owner: 33
      group: 33
    - name: nextcloud-data
      owner: 33
      group: 33
    - name: nextcloud-db
      group: 999
      owner: 999
    - name: nextcloud-nginx-config
    - name: context-chat-backend-data
      mode: 'u=rwx,g=rx,o=rx'
    - name: nextcloud-elastic-data
      owner: 1000
- name: Copy nginx configuration file
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ docker_volumes_path }}/nextcloud-nginx-config"
    mode: u=rw,g=o=r
  loop:
    - mime.types
    - fastcgi_params
  register: nginx1
- name: Copy nginx configuration file
  become: true
  ansible.builtin.template:
    src: "nginx.conf"
    dest: "{{ docker_volumes_path }}/nextcloud-nginx-config"
    mode: u=rw,g=o=r
  register: nginx2
- name: Copy docker file
  become: true
  ansible.builtin.template:
    src: "nextcloud/Dockerfile"
    dest: "/home/{{ ansible_user }}/home-server/stacks/nc/nextcloud.Dockerfile"
    mode: u=rw,g=o=r
  register: nginx2
- name: Copy associated docker files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/home/{{ ansible_user }}/home-server/stacks/nc/{{ item.dest }}"
    mode: u=rw,g=o=r
  loop:
    - src: nextcloud/supervisord.conf
      dest: supervisord.conf
    - src: nextcloud/fulltextsearch.sh
      dest: fulltextsearch.sh
    - src: elasticsearch.yml
      dest: elasticsearch.yml
- name: PostgreSQL upgrade check and backup for Nextcloud
  ansible.builtin.include_tasks: "tasks/upgrade_postgres_service.yml"
  vars:
    service_name: "nextcloud"
    pg_container_name: "nc-ncdb-1"
    pg_database_name: "nextcloud"
    pg_username: "nextcloud"
    pg_password: "{{ database_user_secret }}"
    pg_target_version: "{{ nextcloud_postgres_version | default('15') }}"
    pg_data_dir: "{{ docker_volumes_path }}/nextcloud-database"
    project_src: "/home/{{ ansible_user }}/home-server/stacks/nc"

- name: Create docker-compose stack file
  ansible.builtin.template:
    src: docker-compose.yml
    dest: /home/{{ ansible_user }}/home-server/stacks/nc/docker-compose.yml
    mode: u=rw,g=o=r

- name: Try to pull latest images (continue on failure)
  community.docker.docker_compose_v2:
    pull: "always"
    state: present
    project_src: /home/{{ ansible_user }}/home-server/stacks/nc
  ignore_errors: true
  register: pull_result

- name: Warning - using local images
  ansible.builtin.debug:
    msg: "WARNING: Could not pull latest images. Deploying with existing local images."
  when: pull_result is failed

- name: Deploy stack from a compose file
  community.docker.docker_compose_v2:
    pull: "never"
    build: "always"
    state: "{{ 'restarted' if (nginx1 is changed or nginx2 is changed) else 'present' }}"
    project_src: /home/{{ ansible_user }}/home-server/stacks/nc

- name: Copy Elasticsearch setup script
  ansible.builtin.copy:
    src: elasticsearch_setup.sh
    dest: /home/{{ ansible_user }}/home-server/stacks/nc/elasticsearch_setup.sh
    mode: u=rwx,g=rx,o=rx

- name: Wait for Elasticsearch to be ready
  ansible.builtin.command:
    cmd: >
      docker exec nc-elasticsearch-1 curl -s -u elastic:{{ nc_elastic_secret }}
      http://localhost:9200/_cluster/health
  register: es_health
  until: es_health.rc == 0 and (es_health.stdout | from_json).status is defined
  retries: 30
  delay: 2
  changed_when: false
  failed_when: false

- name: Configure Elasticsearch for single-node (0 replicas)
  ansible.builtin.command:
    cmd: >-
      docker exec nc-elasticsearch-1 curl -X PUT -s
      -u elastic:{{ nc_elastic_secret }}
      http://localhost:9200/_index_template/nextcloud_defaults
      -H "Content-Type: application/json"
      -d '{"index_patterns": ["*"], "priority": 1, "template": {"settings": {"number_of_replicas": 0}}}'
  register: es_config
  failed_when: false
  changed_when: "'acknowledged' in es_config.stdout"

- name: PostgreSQL restore after upgrade for Nextcloud
  ansible.builtin.include_tasks: "tasks/restore_postgres_service.yml"
  vars:
    service_name: "nextcloud"
    pg_container_name: "nc-ncdb-1"
    pg_database_name: "nextcloud"
    pg_username: "nextcloud"
    pg_password: "{{ database_user_secret }}"
    project_src: "/home/{{ ansible_user }}/home-server/stacks/nc"
    pg_backup_retention_days: "{{ postgres_backup_retention_days | default(7) }}"

- name: Wait for nextcloud container to come up
  become: true
  ansible.builtin.wait_for:
    path: "{{ docker_volumes_path }}/nextcloud-www/lib/versioncheck.php"
- name: Check if init is necessary
  become: true
  ansible.builtin.stat:
    path: "{{ docker_volumes_path }}/nextcloud-config/config.php"
  register: config_php

- name: Nextcloud setup
  when: ( not config_php.stat.exists )
  block:
    - name: First setup nextcloud
      ansible.builtin.command:
        cmd: >
          docker exec --user www-data nc-nextcloud-1 php occ maintenance:install
          --database psql --database-host ncdb --database-name nextcloud
          --database-user nextcloud --database-pass {{ database_user_secret }}
          --admin-user admin --admin-pass {{ nextcloud_admin_password }}
          --data-dir {{ docker_volumes_path }}/nextcloud-data
      changed_when: true

    - name: Set nextcloud system config.php values
      ansible.builtin.command:
        cmd: 'docker exec --user www-data nc-nextcloud-1 php occ config:system:set {{ item }}'
      loop: '{{ nextcloud_system_config }}'
      changed_when: true

- name: Run Nextcloud upgrade (if already installed)
  when: config_php.stat.exists
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ upgrade'
  register: nc_upgrade
  failed_when: false
  changed_when: nc_upgrade.rc == 0

- name: Add missing db objects
  when: config_php.stat.exists
  ansible.builtin.command:
    cmd: >-
      docker exec --user www-data nc-nextcloud-1 /bin/bash -c
      "php occ db:add-missing-indices &&
      php occ db:add-missing-columns &&
      php occ db:add-missing-primary-keys &&
      php occ db:convert-filecache-bigint"
  register: add_db_objects
  failed_when: false
  changed_when: add_db_objects.rc == 0

- name: Disable maintenance mode after upgrade
  when: config_php.stat.exists
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ maintenance:mode --off'
  register: maintenance_off
  failed_when: false
  changed_when: "'disabled' in maintenance_off.stdout"

- name: Install apps
  become: true # necessary to read docker_volumes_path content
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ app:install {{ item }} --no-interaction --no-warnings'
    creates: '{{ docker_volumes_path }}/nextcloud-www/apps/{{ item }}'
  register: install_app
  loop: "{{ nextcloud_defaultapp_list }}"

- name: Configure apps config values
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ config:app:set {{ item }}'
  loop: '{{ nextcloud_apps_config }}'
  register: configure_app
  changed_when: "'set to' in configure_app.stdout or 'Config value' in configure_app.stdout"
  failed_when: false

- name: Update apps
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ app:update --all'
  register: update_apps
  failed_when: false
  changed_when: update_apps.rc == 0

- name: Deploy HaRP Traefik dynamic configuration
  become: true
  ansible.builtin.template:
    src: harp_dynamic.yml.j2
    dest: "{{ docker_volumes_path }}/traefik-rules/harp.yml"
    mode: u=rw,g=o=r

- name: List AppAPI daemons
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ app_api:daemon:list'
  register: appapi_daemon_list
  changed_when: false
  failed_when: false

- name: Initialize Harp AppAPI daemon
  ansible.builtin.command:
    cmd: >
      docker exec --user www-data nc-nextcloud-1 php occ app_api:daemon:register
      --net nc_backend harp_proxy_host 'HaRP Proxy (Host)'
      'docker-install' 'https' '{{ app_domain_name }}'
      'https://{{ app_domain_name }}' --harp --harp_frp_address 'harp:8782'
      --harp_shared_key '{{ AppAPISecret }}' --harp_docker_socket_port 24000
      --set-default
  when: appapi_daemon_list.rc == 0 and ('harp_proxy_host' not in appapi_daemon_list.stdout)
  changed_when: true

# HaRP automatically creates a Docker volume named `nc_app_{appid}_data` and mounts it at
# `/{volume_name}` inside every ExApp container (hardcoded in docker_exapp_create in haproxy_agent.py).
# The `--mount` option in `occ app_api:app:register` adds EXTRA mounts and cannot override this default
# path — passing the same target path causes Docker to reject with "Duplicate mount point".
#
# However, HaRP checks if the volume already exists before creating it:
#   if volume exists → use as-is
#   if not         → create a plain Docker volume (data lands in /var/lib/docker/volumes/)
#
# By pre-creating the volume as a bind-mount to /opt/, we ensure HaRP reuses it,
# keeping ExApp data on the host filesystem for backups.
- name: Create context_chat_backend bind-mount Docker volume (data on /opt)
  become: true
  ansible.builtin.command:
    cmd: >
      docker volume create --driver local
      --opt type=none
      --opt device={{ docker_volumes_path }}/context-chat-backend-data
      --opt o=bind
      nc_app_context_chat_backend_data
  register: volume_create
  changed_when: volume_create.rc == 0
  failed_when: false

# Ensure the embedding model is present before ExApp registration.
# bge-m3 is pulled here (not in the ia role) since it is only needed by Nextcloud.
# stream: false makes Ollama wait until the pull is fully complete before returning.
- name: Pull context_chat embedding model into Ollama Embeddings instance
  ansible.builtin.uri:
    url: "http://127.0.0.1:8082/api/pull"
    method: POST
    body_format: json
    body:
      name: "{{ nextcloud_context_chat_embedding_model }}"
      stream: false
    status_code: [200]
    timeout: 600
  register: nc_embedding_pull
  until: nc_embedding_pull.status == 200
  retries: 3
  delay: 10

- name: List registered ExApps
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ app_api:app:list'
  register: appapi_exapp_list
  changed_when: false
  failed_when: false

- name: List enabled Nextcloud apps
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ app:list --enabled'
  register: nc_enabled_app_list
  changed_when: false
  failed_when: false

- name: Warn when exapps look stale (registered but disabled)
  ansible.builtin.debug:
    msg: >-
      WARNING: ExApp {{ item.name }} is registered but not enabled. This may indicate
      a stale state. Deployment keeps normal mode and skips force cleanup.
  loop: >-
    {{
      nextcloud_exapp_list
      | selectattr('name', 'in', appapi_exapp_list.stdout | default(''))
      | rejectattr('name', 'in', nc_enabled_app_list.stdout | default(''))
      | list
    }}
  when: appapi_exapp_list.rc == 0 and nc_enabled_app_list.rc == 0
  changed_when: false

- name: Register exapps on Harp daemon
  ansible.builtin.command:
    cmd: >
      docker exec --user www-data nc-nextcloud-1 php occ app_api:app:register
      --wait-finish
      {{ item.options }}
      {{ item.name }} harp_proxy_host
  register: register_exapp
  loop: >-
    {{
      nextcloud_exapp_list
      | rejectattr('name', 'in', appapi_exapp_list.stdout | default(''))
      | list
    }}
  when: appapi_exapp_list.rc == 0
  changed_when: register_exapp.rc == 0
  failed_when: register_exapp.rc != 0

# context_chat_backend uses CC_EM_BASE_URL=http://ollama-embeddings:11434 for embeddings.
# The ExApp container is placed on nc_backend by HaRP, so we explicitly attach it to ia_network
# to allow hostname resolution of 'ollama-embeddings'. The network connect is idempotent
# (failed_when: false) and must run even when the app was already registered.
- name: Connect context_chat_backend ExApp to ia_network for Ollama Embeddings access
  ansible.builtin.command:
    cmd: docker network connect ia_network nc_app_context_chat_backend
  register: nc_ia_connect
  changed_when: nc_ia_connect.rc == 0
  failed_when: false

# context_agent may use automatic1111 service for image generation.
# Connect it to ia_network to allow hostname resolution.
- name: Connect context_agent ExApp to ia_network for automatic1111 access
  ansible.builtin.command:
    cmd: docker network connect ia_network nc_app_context_agent
  register: nc_ia_connect_agent
  changed_when: nc_ia_connect_agent.rc == 0
  failed_when: false
  when: image_generation_automatic1111_enabled | default(false)

- name: Enable exapps
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ -n app_api:app:enable {{ item.name }}'
  register: enable_exapp
  loop: "{{ nextcloud_exapp_list }}"
  changed_when: "'already enabled' not in (enable_exapp.stdout | lower)"
  failed_when: "enable_exapp.rc != 0 and 'already enabled' not in (enable_exapp.stdout | lower)"

- name: Install context_chat app after backend registration
  become: true
  ansible.builtin.command:
    cmd: 'docker exec --user www-data nc-nextcloud-1 php occ app:install context_chat --no-interaction --no-warnings'
    creates: '{{ docker_volumes_path }}/nextcloud-www/apps/context_chat'

- name: Configure context_chat request timeout
  ansible.builtin.command:
    cmd: >
      docker exec --user www-data nc-nextcloud-1 php occ config:app:set context_chat
      request_timeout --value={{ nextcloud_context_chat_request_timeout }}
  register: context_chat_timeout
  failed_when: false
  changed_when: "'set to' in context_chat_timeout.stdout or 'Config value' in context_chat_timeout.stdout"
...
