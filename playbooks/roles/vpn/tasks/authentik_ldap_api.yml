---
- name: Wait for Authentik API to be ready
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/admin/version/"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_authentik_version
  until: vpn_authentik_version.status == 200
  retries: 10
  delay: 30

- name: Get service account if it already exists
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/core/users/?username={{ vpn_authentik_ldap_service_account_name | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_authentik_service_account_lookup

- name: Filter exact service account match
  ansible.builtin.set_fact:
    vpn_authentik_service_account_matches: >-
      {{
        (vpn_authentik_service_account_lookup.json.results | default([]))
        | selectattr('username', 'equalto', vpn_authentik_ldap_service_account_name)
        | list
      }}

- name: Create service account for LDAP binds
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/core/users/service_account/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ vpn_authentik_ldap_service_account_name }}"
      create_group: false
      expiring: false
    status_code: [200, 201]
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  when: vpn_authentik_service_account_matches | length == 0

- name: Refresh service account after creation
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/core/users/?username={{ vpn_authentik_ldap_service_account_name | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_authentik_service_account_lookup_refreshed

- name: Set service account PK
  ansible.builtin.set_fact:
    vpn_authentik_service_account_pk: "{{ (vpn_authentik_service_account_lookup_refreshed.json.results | first).pk }}"

- name: Set service account password
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/core/users/{{ vpn_authentik_service_account_pk }}/set_password/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      password: "{{ vpn_authentik_ldap_bind_password }}"
    status_code: [200, 204]
    validate_certs: "{{ vpn_authentik_verify_certs }}"

- name: Get default authorization flow
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/flows/instances/?slug=default-provider-authorization-implicit-consent"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_auth_flow_result

- name: Validate authorization flow exists
  ansible.builtin.assert:
    that:
      - vpn_auth_flow_result.json.results | length > 0
    fail_msg: "Default authorization flow 'default-provider-authorization-implicit-consent' not found in Authentik"

- name: Get default invalidation flow
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/flows/instances/?slug=default-provider-invalidation-flow"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_invalidation_flow_result

- name: Validate invalidation flow exists
  ansible.builtin.assert:
    that:
      - vpn_invalidation_flow_result.json.results | length > 0
    fail_msg: "Default invalidation flow 'default-provider-invalidation-flow' not found in Authentik"

- name: Get LDAP bind flow
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/flows/instances/?slug={{ vpn_authentik_ldap_bind_flow_slug | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_ldap_bind_flow_result

- name: Validate LDAP bind flow exists
  ansible.builtin.assert:
    that:
      - vpn_ldap_bind_flow_result.json.results | length > 0
    fail_msg: "LDAP bind flow '{{ vpn_authentik_ldap_bind_flow_slug }}' not found in Authentik; service account binds will fail"

- name: Ensure LDAP provider exists
  block:
    - name: Check LDAP provider by name
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/providers/ldap/?name={{ vpn_authentik_ldap_provider_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_provider_lookup

    - name: Filter exact LDAP provider match
      ansible.builtin.set_fact:
        vpn_ldap_provider_matches: >-
          {{
            (vpn_ldap_provider_lookup.json.results | default([]))
            | selectattr('name', 'equalto', vpn_authentik_ldap_provider_name)
            | list
          }}

    - name: Create LDAP provider
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/providers/ldap/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ vpn_authentik_ldap_provider_name }}"
          authorization_flow: "{{ vpn_auth_flow_result.json.results[0].pk }}"
          invalidation_flow: "{{ vpn_invalidation_flow_result.json.results[0].pk }}"
          bind_flow: "{{ vpn_ldap_bind_flow_result.json.results[0].pk }}"
          base_dn: "{{ vpn_authentik_ldap_base_dn }}"
          bind_mode: "direct"
          search_mode: "direct"
          mfa_support: false
        status_code: [201]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_ldap_provider_matches | length == 0

    - name: Re-read LDAP provider
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/providers/ldap/?name={{ vpn_authentik_ldap_provider_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_provider_lookup_refreshed

    - name: Set LDAP provider PK
      ansible.builtin.set_fact:
        vpn_ldap_provider_pk: "{{ (vpn_ldap_provider_lookup_refreshed.json.results | first).pk }}"

    - name: Ensure LDAP provider bind_flow is set (idempotent update for pre-existing providers)
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/providers/ldap/{{ vpn_ldap_provider_pk }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          bind_flow: "{{ vpn_ldap_bind_flow_result.json.results[0].pk }}"
        status_code: [200]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_ldap_provider_matches | length > 0

- name: Ensure LDAP application exists for provider
  block:
    - name: Check LDAP application by slug
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/applications/?slug={{ vpn_authentik_ldap_application_slug | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_application_lookup

    - name: Filter exact LDAP application match
      ansible.builtin.set_fact:
        vpn_ldap_application_matches: >-
          {{
            (vpn_ldap_application_lookup.json.results | default([]))
            | selectattr('slug', 'equalto', vpn_authentik_ldap_application_slug)
            | list
          }}

    - name: Create LDAP application for provider
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/applications/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ vpn_authentik_ldap_application_name }}"
          slug: "{{ vpn_authentik_ldap_application_slug }}"
          provider: "{{ vpn_ldap_provider_pk | int }}"
          policy_engine_mode: "any"
        status_code: [201]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_ldap_application_matches | length == 0

    - name: Re-read LDAP provider after application association
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/providers/ldap/?name={{ vpn_authentik_ldap_provider_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_provider_lookup_with_application

    - name: Assert LDAP provider has an assigned application
      ansible.builtin.assert:
        that:
          - ((vpn_ldap_provider_lookup_with_application.json.results | first).assigned_application_slug | default('')) | length > 0
        fail_msg: "LDAP provider exists but has no associated application; LDAP outpost will not load it"

- name: Get outpost default settings
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/outposts/instances/default_settings/"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_outpost_default_settings

- name: Ensure LDAP outpost exists
  block:
    - name: Check LDAP outpost by name
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/outposts/instances/?name__iexact={{ vpn_authentik_ldap_outpost_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_outpost_lookup

    - name: Filter exact LDAP outpost match
      ansible.builtin.set_fact:
        vpn_ldap_outpost_matches: >-
          {{
            (vpn_ldap_outpost_lookup.json.results | default([]))
            | selectattr('name', 'equalto', vpn_authentik_ldap_outpost_name)
            | list
          }}

    - name: Create LDAP outpost
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/outposts/instances/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ vpn_authentik_ldap_outpost_name }}"
          type: "ldap"
          providers: "{{ [vpn_ldap_provider_pk | int] | to_json | from_json }}"
          service_connection: null
          config: "{{ vpn_outpost_default_settings.json.config }}"
        status_code: [201]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_ldap_outpost_matches | length == 0

    - name: Re-read LDAP outpost
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/outposts/instances/?name__iexact={{ vpn_authentik_ldap_outpost_name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_outpost_lookup_refreshed

    - name: Set LDAP outpost facts
      ansible.builtin.set_fact:
        vpn_ldap_outpost_obj: "{{ vpn_ldap_outpost_lookup_refreshed.json.results | first }}"
        vpn_authentik_ldap_outpost_uuid_hex: "{{ ((vpn_ldap_outpost_lookup_refreshed.json.results | first).pk | string) | replace('-', '') }}"

    - name: Derive runtime token for LDAP outpost
      ansible.builtin.set_fact:
        vpn_authentik_ldap_outpost_runtime_token: "{{ (vpn_authentik_ldap_outpost_token ~ ':' ~ vpn_ldap_outpost_obj.pk) | hash('sha256') }}"

    - name: Ensure LDAP provider attached to outpost
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/outposts/instances/{{ vpn_ldap_outpost_obj.pk }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          providers: "{{ (((vpn_ldap_outpost_obj.providers | default([]) | map('int') | list) + [vpn_ldap_provider_pk | int]) | unique | list) | to_json | from_json }}"
        status_code: [200]
        validate_certs: "{{ vpn_authentik_verify_certs }}"

    - name: Verify LDAP outpost has at least one provider
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/outposts/instances/{{ vpn_ldap_outpost_obj.pk }}/"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_outpost_after_attach

    - name: Assert LDAP provider is attached to outpost
      ansible.builtin.assert:
        that:
          - vpn_ldap_outpost_after_attach.json.providers | default([]) | length > 0
          - (vpn_ldap_provider_pk | int) in (vpn_ldap_outpost_after_attach.json.providers | default([]) | map('int') | list)
        fail_msg: "LDAP outpost has no provider attached in Authentik; outpost will crash with 'no ldap provider defined'"

- name: Resolve outpost internal user
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/core/users/?username=ak-outpost-{{ vpn_authentik_ldap_outpost_uuid_hex }}"
    method: GET
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
    validate_certs: "{{ vpn_authentik_verify_certs }}"
  register: vpn_outpost_user_lookup

- name: Set outpost internal user PK
  ansible.builtin.set_fact:
    vpn_outpost_user_pk: "{{ (vpn_outpost_user_lookup.json.results | first).pk }}"

- name: Ensure outpost token exists
  block:
    - name: Check outpost token by identifier
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/tokens/?identifier={{ vpn_ldap_outpost_obj.token_identifier | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_outpost_token_lookup

    - name: Wait for Authentik to auto-generate outpost token
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/tokens/?identifier={{ vpn_ldap_outpost_obj.token_identifier | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_outpost_token_lookup
      until: (vpn_outpost_token_lookup.json.results | default([]) | length) > 0
      retries: 10
      delay: 2

    - name: Ensure token belongs to LDAP outpost internal user
      ansible.builtin.assert:
        that:
          - (vpn_outpost_token_lookup.json.results | first).user == (vpn_outpost_user_pk | int)
        fail_msg: "Outpost token identifier exists but is linked to another user"

- name: Set deterministic key for outpost token
  ansible.builtin.uri:
    url: "{{ authentik_api_base_url }}/api/v3/core/tokens/{{ vpn_ldap_outpost_obj.token_identifier | urlencode }}/set_key/"
    method: POST
    headers:
      Authorization: "Bearer {{ authentik_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      key: "{{ vpn_authentik_ldap_outpost_runtime_token | default(vpn_authentik_ldap_outpost_token) }}"
    status_code: [200, 204]
    validate_certs: "{{ vpn_authentik_verify_certs }}"

# ---- Access group -----------------------------------------------------------
- name: Ensure VPN access group exists and is bound to LDAP application
  block:
    - name: Lookup VPN access group by name
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/groups/?name={{ vpn_authentik_access_group | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_access_group_lookup

    - name: Filter exact VPN access group match
      ansible.builtin.set_fact:
        vpn_access_group_matches: >-
          {{
            (vpn_access_group_lookup.json.results | default([]))
            | selectattr('name', 'equalto', vpn_authentik_access_group)
            | list
          }}

    - name: Create VPN access group
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/groups/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ vpn_authentik_access_group }}"
          is_superuser: false
        status_code: [201]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_access_group_matches | length == 0

    - name: Re-read VPN access group
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/groups/?name={{ vpn_authentik_access_group | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_access_group_lookup_refreshed

    - name: Set VPN access group PK
      ansible.builtin.set_fact:
        vpn_access_group_pk: >-
          {{
            (vpn_access_group_lookup_refreshed.json.results
            | selectattr('name', 'equalto', vpn_authentik_access_group)
            | list | first).pk
          }}

    - name: Get LDAP application PK
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/core/applications/?slug={{ vpn_authentik_ldap_application_slug | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_ldap_app_lookup

    - name: Set LDAP application PK
      ansible.builtin.set_fact:
        vpn_ldap_app_pk: "{{ (vpn_ldap_app_lookup.json.results | first).pk }}"

    - name: Check existing group policy binding on LDAP application
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/policies/bindings/?target={{ vpn_ldap_app_pk }}&group={{ vpn_access_group_pk }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_policy_binding_lookup

    - name: Bind VPN access group to LDAP application
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/policies/bindings/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          target: "{{ vpn_ldap_app_pk }}"
          group: "{{ vpn_access_group_pk }}"
          enabled: true
          order: 0
        status_code: [201]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_policy_binding_lookup.json.results | default([]) | length == 0

    - name: Check existing service-account policy binding on LDAP application
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/policies/bindings/?target={{ vpn_ldap_app_pk }}&user={{ vpn_authentik_service_account_pk }}"
        method: GET
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      register: vpn_service_account_policy_binding_lookup

    - name: Bind LDAP service account to LDAP application
      ansible.builtin.uri:
        url: "{{ authentik_api_base_url }}/api/v3/policies/bindings/"
        method: POST
        headers:
          Authorization: "Bearer {{ authentik_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          target: "{{ vpn_ldap_app_pk }}"
          user: "{{ vpn_authentik_service_account_pk }}"
          enabled: true
          order: 0
        status_code: [201]
        validate_certs: "{{ vpn_authentik_verify_certs }}"
      when: vpn_service_account_policy_binding_lookup.json.results | default([]) | length == 0
