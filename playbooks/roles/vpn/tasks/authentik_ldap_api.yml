---
# Run the provisioning script inside the Authentik server container so that
# it can reach the API at http://localhost:9000 directly, bypassing Traefik.
# Python's urllib does not negotiate HTTP/2 (no ALPN h2 offer), which causes
# Traefik to misroute certain POST endpoints (e.g. the RBAC assign action)
# when called from the host over the loopback TLS path.
- name: Upload LDAP provisioning script to remote host
  ansible.builtin.copy:
    src: "{{ role_path }}/files/authentik_provision_ldap.py"
    dest: "/home/{{ ansible_user }}/home-server/stacks/vpn/authentik_provision_ldap.py"
    mode: '0700'

- name: Copy LDAP provisioning script into Authentik container
  ansible.builtin.command:
    cmd: >-
      docker cp /home/{{ ansible_user }}/home-server/stacks/vpn/authentik_provision_ldap.py
      authentik-server-1:/tmp/authentik_provision_ldap.py
  changed_when: false

- name: Write env file for LDAP provisioning script
  ansible.builtin.template:
    src: authentik_ldap_env.j2
    dest: "/home/{{ ansible_user }}/home-server/stacks/vpn/authentik_ldap.env"
    mode: '0600'

- name: Provision Authentik LDAP objects (service account, bind flow, provider, outpost, bindings)
  ansible.builtin.command:
    cmd: >-
      docker exec
      --env-file /home/{{ ansible_user }}/home-server/stacks/vpn/authentik_ldap.env
      authentik-server-1
      python3 /tmp/authentik_provision_ldap.py
    # Use Authentik's internal HTTPS listener to avoid the HTTP→HTTPS redirect
    # that Authentik issues on port 9000, which would bounce the request back
    # through Traefik (where Python urllib's missing ALPN h2 causes misrouting).
  register: vpn_ldap_provision
  changed_when:
    - vpn_ldap_provision.rc == 0
    - vpn_ldap_provision.stdout_lines | length > 0
    - (vpn_ldap_provision.stdout_lines | last | from_json).changed

- name: Set Authentik LDAP provisioning facts
  ansible.builtin.set_fact:
    vpn_authentik_service_account_pk: "{{ result.service_account_pk }}"
    vpn_ldap_provider_pk: "{{ result.provider_pk }}"
    vpn_ldap_app_pk: "{{ result.app_pk }}"
    vpn_authentik_ldap_outpost_uuid_hex: "{{ result.outpost_uuid_hex }}"
    vpn_authentik_ldap_outpost_runtime_token: "{{ result.runtime_token }}"
  vars:
    result: "{{ vpn_ldap_provision.stdout_lines | last | from_json }}"
